<script>
  function getTargetUrl(url) {
    let cleanUrl = url.split('?')[0].split('#')[0];
    let parsedUrl;
    try {
      parsedUrl = new URL(cleanUrl);
    } catch(e) {
      parsedUrl = { pathname: cleanUrl }; // Fallback
    }
    let path = parsedUrl.pathname;
    
    // 既に拡張子 .html がついている場合の対策（保険）
    if (cleanUrl.endsWith('.html')) {
      cleanUrl = cleanUrl.slice(0, -5);
      path = path.slice(0, -5);
    }
    
    // 1. トップページ
    if (path === '/' || path === '') {
      let base = cleanUrl;
      if (base.endsWith('/')) base = base.slice(0, -1);
      return base + '/index-en';
    }
    if (path === '/index-en' || path === '/index-en/') {
      let base = cleanUrl;
      if (base.endsWith('/')) base = base.slice(0, -1);
      return base.replace(/\/index-en$/, '/');
    }
    
    // 2. 固定ページ (/blog, /about, /note, /privacy)
    const rootPages = ['/blog', '/about', '/note', '/privacy', '/contact'];
    let matchedPage = rootPages.find(p => path === p || path === p + '/');
    if (matchedPage) {
      let base = cleanUrl;
      if (base.endsWith('/')) base = base.slice(0, -1);
      return base + '-en';
    }
    
    // 英語の固定ページ (/blog-en, /about-en, /note-en, /privacy-en)
    const rootPagesEn = ['/blog-en', '/about-en', '/note-en', '/privacy-en', '/contact-en'];
    let matchedPageEn = rootPagesEn.find(p => path === p || path === p + '/');
    if (matchedPageEn) {
      let base = cleanUrl;
      if (base.endsWith('/')) base = base.slice(0, -1);
      return base.slice(0, -3); // "-en" を削除
    }
    
    // 3. 個別記事
    if (path.endsWith('/index-en') || path.endsWith('/index-en/')) {
      let base = cleanUrl;
      if (base.endsWith('/')) base = base.slice(0, -1);
      return base.slice(0, -8); // "/index-en" を削って末尾を "/" にする
    }
    
    if (cleanUrl.endsWith('/')) {
      return cleanUrl + 'index-en';
    } else {
      return cleanUrl + '/index-en';
    }
  }

  function switchLanguage() {
    let targetUrl = getTargetUrl(window.location.href);
    
    // ローカルプレビュー環境（localhost/127.0.0.1）では、
    // 拡張子なしのURLだと404エラーになるため、明示的に .html を付加します。
    const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
    if (isLocal) {
      let targetPath = targetUrl.split('?')[0].split('#')[0];
      if (!targetPath.endsWith('/') && !targetPath.endsWith('.html')) {
        try {
          let urlObj = new URL(targetUrl);
          targetUrl = urlObj.origin + urlObj.pathname + '.html' + urlObj.search + urlObj.hash;
        } catch(e) {
          const queryIndex = targetUrl.indexOf('?');
          const hashIndex = targetUrl.indexOf('#');
          let splitIndex = targetUrl.length;
          if (queryIndex !== -1 && hashIndex !== -1) splitIndex = Math.min(queryIndex, hashIndex);
          else if (queryIndex !== -1) splitIndex = queryIndex;
          else if (hashIndex !== -1) splitIndex = hashIndex;
          targetUrl = targetUrl.slice(0, splitIndex) + '.html' + targetUrl.slice(splitIndex);
        }
      }
    }
    
    window.location.href = targetUrl;
  }

  document.addEventListener("DOMContentLoaded", async function() {
    const navLinks = document.querySelectorAll('.navbar-nav .nav-link, .navbar-nav a');
    let langLink = null;
    for (let link of navLinks) {
      if (link.textContent.includes("EN / JP") || link.querySelector('.bi-globe')) {
        langLink = link;
        break;
      }
    }

    if (langLink) {
      let url = window.location.href;
      let cleanUrl = url.split('?')[0].split('#')[0];
      let isEn = document.documentElement.lang.startsWith('en') || cleanUrl.match(/-en(\.html|\/)?$/) || cleanUrl.includes('-en.html') || cleanUrl.includes('/-en/');
      
      let targetUrl = getTargetUrl(url);

      // ローカル環境や一部の静的サーバーでの存在チェック（HEADリクエスト）のため、
      // 拡張子もスラッシュもないURLには .html を補完して fetch を行います。
      let checkUrl = targetUrl;
      let checkPath = targetUrl.split('?')[0].split('#')[0];
      if (!checkPath.endsWith('/') && !checkPath.endsWith('.html')) {
        try {
          let urlObj = new URL(targetUrl);
          checkUrl = urlObj.origin + urlObj.pathname + '.html' + urlObj.search + urlObj.hash;
        } catch(e) {
          const queryIndex = targetUrl.indexOf('?');
          const hashIndex = targetUrl.indexOf('#');
          let cleanTarget = targetUrl;
          let suffix = '';
          if (queryIndex !== -1 || hashIndex !== -1) {
            let splitIndex = queryIndex !== -1 ? queryIndex : hashIndex;
            if (hashIndex !== -1 && queryIndex !== -1) {
              splitIndex = Math.min(queryIndex, hashIndex);
            }
            cleanTarget = targetUrl.slice(0, splitIndex);
            suffix = targetUrl.slice(splitIndex);
          }
          checkUrl = cleanTarget + '.html' + suffix;
        }
      }

      try {
        const response = await fetch(checkUrl, { method: 'HEAD' });
        if (!response.ok) {
          const parentLi = langLink.closest('li.nav-item');
          if (parentLi) parentLi.remove();
          else langLink.remove();
          return;
        }
      } catch (error) {
        const parentLi = langLink.closest('li.nav-item');
        if (parentLi) parentLi.remove();
        else langLink.remove();
        return;
      }

      const toggleContainer = document.createElement('li');
      toggleContainer.className = 'nav-item lang-toggle-wrapper';
      toggleContainer.innerHTML = `
        <div class="lang-switch-container ${isEn ? 'is-en' : 'is-jp'}" onclick="switchLanguage()" title="Switch Language">
          <span class="lang-text jp-text">JAPANESE</span>
          <div class="lang-mini-toggle">
            <div class="lang-mini-slider"></div>
          </div>
          <span class="lang-text en-text">ENGLISH</span>
        </div>
      `;
      
      const parentLi = langLink.closest('li.nav-item');
      if (parentLi) {
        parentLi.parentElement.replaceChild(toggleContainer, parentLi);
      } else {
        langLink.parentElement.replaceChild(toggleContainer, langLink);
      }
    }
  });
</script>
