project:
  type: website
  output-dir: _site
  resources:
    - "apps/"
    - "_headers"
    - "ads.txt"

# サイトの言語を日本語に設定
lang: ja

website:
  title: "DeepFlows"
  favicon: "profile.png"
  description: "Science beneath the surface. 地下水・地球化学解析（MODFLOW/PHREEQC）から温泉の科学、自然地理学、Python・AIを用いたデータ分析まで、深く探求する知見を共有します。"
  
  site-url: "https://deepflows.net"
  google-analytics: "G-WYF8CN3PMT"

  open-graph: true
  twitter-card: 
    image: "profile.png" 
    card-style: summary_large_image

  navbar:
    search: true # 記事が増えるため検索を有効化
    left:
      - href: index.qmd
        text: Home  
      - href: blog.qmd
        text: Series  
      - href: onsen.qmd
        text: Geo & Onsen        
      - href: note.qmd
        text: Lab Notes
      - href: apps.qmd      
        text: Apps          
      - href: about.qmd
        text: About
    right:
      - icon: globe
        text: "EN / JP"
        href: "javascript:switchLanguage()"

  page-footer:
    center: "© 2026 DeepFlow · Science beneath the surface"
    right:
      - text: "Privacy Policy"
        href: privacy.qmd # AdSense審査に必須のプライバシーポリシー

format:
  html:
    # --- ライト/ダーク切り替えの標準的な設定 ---
    theme:
      light: flatly         
    css: styles.css
    include-in-header:
      - text: |
          <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1900441978503848"
          crossorigin="anonymous"></script>
      - file: switch-lang.html
  
    highlight-style: 
      light: arrow
       
    code-fold: true
    code-copy: true
    toc: true
    toc-title: "目次"
    number-sections: true # 科学的な記事の構造を分かりやすく
    mathjax: true # 数式（LaTeX）を多用する場合に必須

editor: visual