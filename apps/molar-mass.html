<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Molar Mass Calculator</title>
</head>
<body>

<style>
/* ── リセット & 変数 ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #F7F5F0;
  --card:      #FFFFFF;
  --border:    #E8E4DC;
  --accent:    #E07B39;
  --accent2:   #C96A28;
  --accent-bg: #FDF3EC;
  --text:      #1A1A1A;
  --muted:     #7A746A;
  --blue:      #3B6FD4;
  --blue-bg:   #EEF3FB;
  --error:     #D94F4F;
  --error-bg:  #FDF0F0;
  --sub-num:   #E07B39;
  --radius:    12px;
  --shadow:    0 2px 12px rgba(0,0,0,0.08);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 0;
}

/* ── カードラッパー ── */
.mm-card {
  max-width: 680px;
  margin: 0 auto;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 18px;
  box-shadow: var(--shadow);
  overflow: hidden;
}

/* ── ヘッダー ── */
.mm-header {
  display: flex;
  align-items: center;
  gap: 18px;
  padding: 28px 30px 22px;
  border-bottom: 1.5px solid var(--border);
}

.mm-header-icon {
  width: 64px;
  height: 64px;
  background: var(--accent-bg);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  flex-shrink: 0;
}

.mm-header-text h2 {
  font-size: 20px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
}

.mm-header-text p {
  font-size: 15px;
  color: var(--muted);
  margin-top: 2px;
}

/* ── ボディ ── */
.mm-body {
  padding: 25px 30px 30px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* ── 入力行 ── */
.mm-input-row {
  display: flex;
  gap: 8px;
}

.mm-formula-input {
  flex: 1;
  height: 52px;
  padding: 0 18px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Roboto Mono', 'Consolas', 'Courier New', monospace;
  font-size: 18px;
  background: var(--bg);
  color: var(--text);
  transition: border-color 0.18s;
  outline: none;
}

.mm-formula-input:focus {
  border-color: var(--accent);
  background: #FEFAF6;
}

.mm-calc-btn {
  height: 52px;
  padding: 0 24px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.18s, transform 0.1s;
  white-space: nowrap;
}

.mm-calc-btn:hover  { background: var(--accent2); }
.mm-calc-btn:active { transform: scale(0.97); }

/* ── Quick Examples ── */
.mm-quick-row {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}

.mm-quick-label {
  font-size: 14px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-right: 2px;
}

.mm-chip {
  padding: 6px 14px;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Roboto Mono', 'Consolas', 'Courier New', monospace;
  font-size: 15px;
  color: var(--text);
  background: var(--bg);
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s, color 0.15s;
}

.mm-chip:hover {
  border-color: var(--accent);
  background: var(--accent-bg);
  color: var(--accent);
}

/* ── Result Display ── */
.mm-result-panel {
  background: var(--accent-bg);
  border: 2px solid #F0C9A8;
  border-radius: var(--radius);
  padding: 28px;
  min-height: 120px;
}

.mm-result-label {
  font-size: 14px;
  font-weight: 600;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  margin-bottom: 12px;
}

.mm-result-formula {
  font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Roboto Mono', 'Consolas', 'Courier New', monospace;
  font-size: 36px;
  font-weight: 600;
  color: var(--accent);
  line-height: 1.2;
  letter-spacing: -0.01em;
}

.mm-result-formula sub {
  font-size: 0.62em;
  vertical-align: sub;
  color: var(--accent);
}

.mm-result-mass {
  font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Roboto Mono', 'Consolas', 'Courier New', monospace;
  font-size: 28px;
  font-weight: 600;
  color: var(--blue);
  margin-top: 6px;
}

.mm-result-placeholder {
  color: var(--muted);
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 70px;
}

.mm-result-error {
  color: var(--error);
  font-size: 16px;
  font-weight: 500;
}

/* ── インライン通知バナー（alert の代替） ── */
.mm-notice {
  display: none;
  padding: 10px 16px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  border: 1.5px solid;
}

.mm-notice.error {
  display: block;
  background: var(--error-bg);
  color: var(--error);
  border-color: #F5C0C0;
}

/* ── 濃度変換 ── */
.mm-section-label {
  font-size: 14px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  margin-bottom: 10px;
}

.mm-conv-desc {
  font-size: 15px;
  color: var(--muted);
  margin-bottom: 12px;
  line-height: 1.5;
}

.mm-conv-row {
  display: flex;
  gap: 6px;
}

.mm-conv-input {
  flex: 1;
  height: 46px;
  padding: 0 16px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Roboto Mono', 'Consolas', 'Courier New', monospace;
  font-size: 16px;
  background: var(--bg);
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}

.mm-conv-input:focus { border-color: var(--accent); }

.mm-conv-select {
  height: 46px;
  padding: 0 12px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  background: var(--bg);
  color: var(--text);
  cursor: pointer;
  outline: none;
}

.mm-conv-btn {
  height: 46px;
  padding: 0 18px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
}

.mm-conv-btn:hover { background: var(--accent2); }

/* 変換結果グリッド */
.mm-conv-result {
  display: none;
  margin-top: 10px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}

.mm-conv-result.visible { display: block; }

.mm-conv-result table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

.mm-conv-result th {
  background: var(--bg);
  color: var(--muted);
  font-weight: 600;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 8px 12px;
  text-align: left;
  border-bottom: 1.5px solid var(--border);
}

.mm-conv-result td {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  font-family: 'DM Mono', monospace;
}

.mm-conv-result tr:last-child td { border-bottom: none; }
.mm-conv-result tr:hover td { background: var(--bg); }
.mm-conv-input-row td:first-child { color: var(--muted); font-size: 12px; }
.mm-conv-value { color: var(--blue); font-weight: 500; }

/* ── 仕切り線 ── */
.mm-divider {
  height: 1px;
  background: var(--border);
  margin: 0 -24px;
  width: calc(100% + 48px);
}

/* ── レスポンシブ ── */
@media (max-width: 520px) {
  .mm-card { border-radius: 0; border-left: none; border-right: none; }
  .mm-body { padding: 16px 16px 20px; }
  .mm-header { padding: 18px 16px 14px; }
  .mm-divider { margin: 0 -16px; width: calc(100% + 32px); }
}
</style>

<div class="mm-card">

  <!-- ヘッダー -->
  <div class="mm-header">
    <div class="mm-header-icon">⚗️</div>
    <div class="mm-header-text">
      <h2>Mineral &amp; Compound Molar Mass Calculator</h2>
      <p>鉱物・化合物 分子量計算機</p>
    </div>
  </div>

  <!-- ボディ -->
  <div class="mm-body">

    <!-- 入力 -->
    <div>
      <div class="mm-section-label">Formula</div>
      <div class="mm-input-row">
        <input type="text" id="mm-formula" class="mm-formula-input"
               placeholder="化学式を入力 例 CaSO4·2H2O,Ca(OH)2">
        <button class="mm-calc-btn" onclick="mmCalc()">Calculate Molar Mass</button>
      </div>
    </div>

    <!-- Quick Examples -->
    <div class="mm-quick-row">
      <span class="mm-quick-label">Quick Examples</span>
      <span class="mm-chip" onclick="mmSet('NaCl')">NaCl</span>
      <span class="mm-chip" onclick="mmSet('CaSO4·2H2O')">CaSO₄·2H₂O</span>
      <span class="mm-chip" onclick="mmSet('Ca(OH)2')">Ca(OH)₂</span>
      <span class="mm-chip" onclick="mmSet('SiO2')">SiO₂</span>
      <span class="mm-chip" onclick="mmSet('Fe2O3')">Fe₂O₃</span>
    </div>

    <!-- Result Display -->
    <div class="mm-result-panel" id="mm-result-panel">
      <div class="mm-result-label">Result Display</div>
      <div id="mm-result-body" class="mm-result-placeholder">
        ここに分子量が表示されます
      </div>
    </div>

    <div class="mm-divider"></div>

    <!-- 濃度変換 -->
    <div>
      <div class="mm-section-label">Concentration Converter</div>
      <div class="mm-conv-desc">
        計算された分子量を使って単位を変換します。<br>
        mol/L ↔ mmol/L ↔ g/L ↔ mg/L
      </div>
      <div class="mm-notice" id="mm-conv-notice"></div>
      <div class="mm-conv-row" style="margin-top: 8px;">
        <input type="number" id="mm-conv-val" class="mm-conv-input" placeholder="数値を入力">
        <select id="mm-conv-unit" class="mm-conv-select">
          <option value="mol">mol/L</option>
          <option value="mmol">mmol/L</option>
          <option value="g">g/L</option>
          <option value="mg">mg/L</option>
        </select>
        <button class="mm-conv-btn" onclick="mmConvert()">Convert</button>
      </div>
      <div class="mm-conv-result" id="mm-conv-result"></div>
    </div>

  </div><!-- /mm-body -->
</div><!-- /mm-card -->

<script>
// ===== 全元素データ =====
const AW = {
  H:1.008,He:4.0026,Li:6.94,Be:9.0122,B:10.81,C:12.011,N:14.007,O:15.999,
  F:18.998,Ne:20.180,Na:22.990,Mg:24.305,Al:26.982,Si:28.085,P:30.974,S:32.06,
  Cl:35.45,Ar:39.948,K:39.098,Ca:40.078,Sc:44.956,Ti:47.867,V:50.942,Cr:51.996,
  Mn:54.938,Fe:55.845,Co:58.933,Ni:58.693,Cu:63.546,Zn:65.38,Ga:69.723,Ge:72.630,
  As:74.922,Se:78.971,Br:79.904,Kr:83.798,Rb:85.468,Sr:87.62,Y:88.906,Zr:91.224,
  Nb:92.906,Mo:95.96,Tc:98,Ru:101.07,Rh:102.91,Pd:106.42,Ag:107.868,Cd:112.414,
  In:114.818,Sn:118.710,Sb:121.760,I:126.904,Xe:131.293,Cs:132.905,Ba:137.327,
  La:138.905,Ce:140.116,Pr:140.907,Nd:144.242,Pm:145,Sm:150.36,Eu:151.964,Gd:157.25,
  Tb:158.925,Dy:162.500,Ho:164.930,Er:167.259,Tm:168.934,Yb:173.054,Lu:174.966,Hf:178.49,
  Ta:180.948,W:183.84,Re:186.207,Os:190.23,Ir:192.217,Pt:195.084,Au:196.967,Hg:200.592,
  Tl:204.383,Pb:207.2,Bi:208.980,U:238.029,Th:232.038,Pa:231.036
};

// ===== 入力検証 =====
function validateFormula(formula) {
  if (formula.length > 200)
    throw new Error('化学式が長すぎます（最大200文字）');
  if (!formula.trim())
    throw new Error('化学式を入力してください');
  if (!/^[A-Za-z0-9()·•\-\+\s]+$/.test(formula))
    throw new Error('無効な文字が含まれています');

  const parentheses = (formula.match(/\(/g) || []).length;
  if (parentheses > 10)
    throw new Error('式が複雑すぎます（括弧は10個まで）');

  let maxDepth = 0, currentDepth = 0;
  for (const char of formula) {
    if (char === '(') currentDepth++;
    if (char === ')') currentDepth--;
    maxDepth = Math.max(maxDepth, currentDepth);
  }
  if (maxDepth > 5)
    throw new Error('ネストが深すぎます（最大5レベル）');
}

// ===== 化学式パーサー =====
function parseFormula(formula) {
  validateFormula(formula);

  // ·（中点）を括弧表記に変換: CaSO4·2H2O → CaSO4(H2O)2
  formula = formula.replace(/[·•]/g, '\u00B7');
  formula = formula.replace(/\u00B7(\d*)([A-Z][^·]*)(?=\u00B7|$)/g, (m, n, mol) => {
    return '(' + mol.trim() + ')' + (n || '1');
  });
  // (Mg,Fe) のような混合表記を簡略化
  formula = formula.replace(/\(([A-Z][a-z]?)(?:,[A-Z][a-z]?)+\)/g, (m, p1) => '(' + p1 + '1)');

  const elements = {};
  function parse(str) {
    const re = /([A-Z][a-z]?)(\d*)|\(([^)]*)\)(\d*)/g;
    let match;
    while ((match = re.exec(str)) !== null) {
      if (match[1]) {
        const el = match[1], n = parseInt(match[2] || '1');
        elements[el] = (elements[el] || 0) + n;
      } else {
        const sub = parseInner(match[3]);
        const n = parseInt(match[4] || '1');
        for (const el in sub) elements[el] = (elements[el] || 0) + sub[el] * n;
      }
    }
  }
  function parseInner(str) {
    const res = {}, re = /([A-Z][a-z]?)(\d*)|\(([^)]*)\)(\d*)/g;
    let match;
    while ((match = re.exec(str)) !== null) {
      if (match[1]) {
        const el = match[1], n = parseInt(match[2] || '1');
        res[el] = (res[el] || 0) + n;
      } else {
        const sub = parseInner(match[3]);
        const n = parseInt(match[4] || '1');
        for (const el in sub) res[el] = (res[el] || 0) + sub[el] * n;
      }
    }
    return res;
  }
  parse(formula);
  return elements;
}

// ===== HTML エスケープ（XSS 対策）=====
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ===== 化学式を HTML に整形（下付き数字）=====
function formatFormulaHTML(formula) {
  return escapeHtml(formula)
    .replace(/[·•\u00B7]/g, '·')
    .replace(/(\d+)/g, '<sub>$1</sub>')
    .replace(/·<sub>(\d+)<\/sub>/g, '·$1');
}

// ===== 状態 =====
let lastMass = 0;
let lastFormula = '';

// ===== 計算 =====
function mmCalc() {
  const raw  = document.getElementById('mm-formula').value.trim();
  const body = document.getElementById('mm-result-body');

  if (!raw) {
    body.className   = 'mm-result-error';
    body.textContent = 'Please enter a chemical formula.';
    return;
  }

  let elements;
  try {
    elements = parseFormula(raw);
  } catch (e) {
    body.className   = 'mm-result-error';
    body.textContent = 'Parse error: ' + (e.message || 'Invalid formula');
    return;
  }

  let mass = 0;
  const unknown = [];
  for (const el in elements) {
    if (AW[el]) mass += AW[el] * elements[el];
    else unknown.push(el);
  }

  if (unknown.length) {
    body.className   = 'mm-result-error';
    body.textContent = 'Unknown element(s): ' + unknown.join(', ');
    return;
  }
  if (mass === 0) {
    body.className   = 'mm-result-error';
    body.textContent = 'Could not calculate. Check formula syntax.';
    return;
  }

  lastMass    = mass;
  lastFormula = raw;

  body.className = '';
  body.innerHTML =
    '<div class="mm-result-formula">' + formatFormulaHTML(raw) + '</div>' +
    '<div class="mm-result-mass">'    + mass.toFixed(4) + ' g/mol</div>';

  // 親ページ（iframe）に高さを通知
  notifyHeight();
}

// ===== 濃度変換エラー表示 =====
function showConvNotice(msg) {
  const el = document.getElementById('mm-conv-notice');
  el.textContent = msg;
  el.className   = 'mm-notice error';
}
function clearConvNotice() {
  const el = document.getElementById('mm-conv-notice');
  el.className   = 'mm-notice';
  el.textContent = '';
}

// ===== 濃度変換 =====
function mmConvert() {
  clearConvNotice();

  if (!lastMass) {
    showConvNotice('先に化学式を入力して分子量を計算してください。');
    return;
  }
  const val = parseFloat(document.getElementById('mm-conv-val').value);
  if (isNaN(val)) {
    showConvNotice('数値を入力してください。');
    return;
  }

  const unit = document.getElementById('mm-conv-unit').value;
  const M    = lastMass;

  let mol;
  if      (unit === 'mol')  mol = val;
  else if (unit === 'mmol') mol = val / 1000;
  else if (unit === 'g')    mol = val / M;
  else                      mol = val / 1000 / M;

  const mmol = mol * 1000;
  const g    = mol * M;
  const mg   = g * 1000;

  const unitLabel = { mol:'mol/L', mmol:'mmol/L', g:'g/L', mg:'mg/L' }[unit];

  const wrap = document.getElementById('mm-conv-result');
  wrap.className = 'mm-conv-result visible';
  wrap.innerHTML = `
    <table>
      <thead><tr><th>単位</th><th>値</th></tr></thead>
      <tbody>
        <tr class="mm-conv-input-row">
          <td>入力 (${escapeHtml(unitLabel)})</td>
          <td class="mm-conv-value">${val}</td>
        </tr>
        <tr><td>mol/L</td> <td class="mm-conv-value">${mol.toExponential(4)}</td></tr>
        <tr><td>mmol/L</td><td class="mm-conv-value">${mmol.toFixed(4)}</td></tr>
        <tr><td>g/L</td>   <td class="mm-conv-value">${g.toFixed(4)}</td></tr>
        <tr><td>mg/L</td>  <td class="mm-conv-value">${mg.toFixed(2)}</td></tr>
      </tbody>
    </table>`;

  // 親ページ（iframe）に高さを通知
  notifyHeight();
}

// ===== Quick Example セット =====
function mmSet(f) {
  document.getElementById('mm-formula').value = f;
  mmCalc();
}

// ===== iframe 高さ自動通知 =====
function notifyHeight() {
  const h = document.body.scrollHeight;
  window.parent.postMessage({ type: 'resize', height: h }, '*');
}

// ===== 初期化 =====
document.addEventListener('DOMContentLoaded', () => {
  // 初回高さ通知
  notifyHeight();

  document.getElementById('mm-formula').addEventListener('keypress', e => {
    if (e.key === 'Enter') { e.preventDefault(); mmCalc(); }
  });
  document.getElementById('mm-conv-val').addEventListener('keypress', e => {
    if (e.key === 'Enter') { e.preventDefault(); mmConvert(); }
  });

  // レイアウト変化を監視して高さを随時通知
  new ResizeObserver(notifyHeight).observe(document.body);
});
</script>

</body>
</html>
